name: traffic_builder
description: "Traffic Builder — monitors your route home and notifies when traffic changes."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP client
  dio: ^5.7.0

  # WebSocket
  socket_io_client: ^2.0.3+1

  # OpenStreetMap map — no API key required
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # GPS
  geolocator: ^13.0.4

  # Runtime permissions
  permission_handler: ^11.3.1

  # Local push notifications
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
